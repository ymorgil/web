name: Update submodules

on:
   push:
      branches: [main]

permissions:
   contents: write # ← esto es todo lo que necesitas

jobs:
   update:
      runs-on: ubuntu-latest
      steps:
         - uses: actions/checkout@v4
           with:
              submodules: recursive
              token: ${{ secrets.GITHUB_TOKEN }} # ← token automático de GitHub

         - name: Update submodule add
           run: |
              git submodule update --remote content/docs/add
              git config user.name "github-actions"
              git config user.email "github-actions@github.com"

         - name: Commit y push si hay cambios
           run: |
              if ! git diff --quiet; then
                git add content/docs/add
                git commit -m "chore: actualizar submódulo add"
                git push
              else
                echo "Sin cambios en add"
              fi
