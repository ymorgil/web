name: Desplegar sitio Hugo en Pages

on:
   push:
      branches: [main]

permissions:
   contents: read
   pages: write
   id-token: write

concurrency:
   group: "pages"
   cancel-in-progress: false

jobs:
   construir:
      runs-on: ubuntu-latest
      steps:
         - name: Descargar repositorio
           uses: actions/checkout@v4
           with:
              submodules: recursive

         - name: Instalar Hugo
           uses: peaceiris/actions-hugo@v3
           with:
              hugo-version: "latest"
              extended: true

         - name: Construir sitio
           run: hugo --minify

         - name: Subir artefacto
           uses: actions/upload-pages-artifact@v3
           with:
              path: ./public

   desplegar:
      environment:
         name: github-pages
         url: ${{ steps.despliegue.outputs.page_url }}
      runs-on: ubuntu-latest
      needs: construir
      steps:
         - name: Desplegar en GitHub Pages
           id: despliegue
           uses: actions/deploy-pages@v4
